<html>
    <style>
        body {
            background: linear-gradient(to bottom, #0000ff, #8a2be2);
            font-family: Arial, sans-serif;
            color: white;
            text-align: center;
            margin: 0;
            padding: 0;
        }
        .header {
            background-color: #4b0082;
            padding: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .header img {
            width: 80px;
            height: 50px;
            margin-right: 10px;
        }

        .header h1 {
            margin: 5px 0;
            font-size: 18px;
        }
        .header h2 {
            margin: 0;
            font-size: 14px;
        }
        .title {
            background-color: #8b4513;
            padding: 10px;
            font-size: 18px;
            font-weight: bold;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        .title .home-icon {
            position: absolute;
            left: 10px;
            font-size: 24px;
            color: white;
            cursor: pointer;
        }
        .photo-area {
            margin: 20px auto;
            width: 80%;
            max-width: 600px;
            height: 288px; /* Decreased by 10% from the original 320px */
            background-color: white;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .photo-area img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
            padding: 20px;
            text-align: left;
            width: 80%;
            margin: 0 auto;
        }
        .info-grid div {
            background-color: white;
            color: black;
            padding: 10px;
            border-radius: 5px;
        }
        .info-grid .full-width {
            grid-column: span 3;
        }
        .info-grid .label {
            font-weight: bold;
        }
        .info-grid .col-span-2 {
            grid-column: span 2;
        }
        .obs-box {
            grid-column: span 3;
            height: 90px; /* Decreased by 10% from the original 100px */
        }
        .footer {
            background-color: #4b0082;
            padding: 10px;
            text-align: center;
            font-size: 14px;
        }
    </style>

    <div class="header">
        <img alt="Polícia Civil logo" src="{{ url_for('static', filename='img/logo.png') }}"/>
        <div>
            <h1>RONDÔNIA</h1>
            <h2>POLÍCIA CIVIL</h2>
        </div>
    </div>
    <div class="title">
        <a href="/" class="home-icon"><i class="fas fa-home"></i></a>
        Endereço do Alvo
    </div>
    
    <div class="photo-area">
        <img alt="Foto da casa do alvo" src="https://via.placeholder.com/600x288" />
    </div>
    
    <div class="info-grid">
        <div class="full-width">
            <span class="label">Rua:</span> <span id="rua">[Rua]</span>
        </div>
        <div>
            <span class="label">Nº:</span> <span id="numero">[Número]</span>
        </div>
        <div class="col-span-2">
            <span class="label">Complemento:</span> <span id="complemento">[Complemento]</span>
        </div>
        <div>
            <span class="label">Bairro:</span> <span id="bairro">[Bairro]</span>
        </div>
        <div>
            <span class="label">Cidade:</span> <span id="cidade">[Cidade]</span>
        </div>
        <div>
            <span class="label">UF:</span> <span id="uf">[UF]</span>
        </div>
        <div class="obs-box">
            <span class="label">Observação:</span> <span id="observacao">[Observação]</span>
        </div>
    </div>
    <div class="footer">
        &copy; 2024 Polícia Civil de Rondônia
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/js/all.min.js"></script>
</html>
